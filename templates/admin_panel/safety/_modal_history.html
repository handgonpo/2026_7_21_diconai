<!-- 반영 이력 모달 — 좌측: 발행 시점 리스트, 우측: 선택 시점의 read-only 스냅샷.
     JS(safety/checklist.js _openHistory / _renderHistoryDetail)가 채움. -->
<div class="modal-overlay" id="historyModal" hidden>
    <div class="modal-dialog modal-wide" role="dialog" aria-labelledby="historyTitle">
        <header class="modal-header">
            <h3 id="historyTitle">반영 이력</h3>
            <button class="modal-close" id="historyClose" aria-label="닫기">닫기</button>
        </header>
        <p class="modal-desc">날짜를 선택하면 해당 시점의 체크리스트를 읽기 전용으로 확인할 수 있습니다.</p>
        <div class="history-body">
            <aside class="history-list-pane">
                <div class="history-list-title">기준 일시<small>반영 시점을 선택합니다.</small></div>
                <ul class="history-list" id="historyList">
                    <li class="empty-state">불러오는 중...</li>
                </ul>
                <div class="history-tip">
                    <strong>안내</strong>
                    <ul>
                        <li>날짜를 선택하면 우측 체크리스트가 전환됩니다.</li>
                        <li>모든 문항과 서약 문구는 읽기 전용입니다.</li>
                        <li>스크롤 영역을 내려 전체 내용을 확인합니다.</li>
                    </ul>
                </div>
            </aside>
            <section class="history-detail-pane" id="historyDetail">
                <p class="empty-state">좌측에서 일시를 선택해 주세요.</p>
            </section>
        </div>
    </div>
</div>
