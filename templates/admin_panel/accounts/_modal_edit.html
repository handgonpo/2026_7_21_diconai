<!-- 사용자 정보 수정 모달 -->
<div id="editUserModal" class="modal-overlay" style="display:none;">
    <div class="modal-container">
        <div class="modal-header">
            <div>
                <h3>사용자 정보 수정</h3>
                <p class="modal-desc">사용자의 프로필 정보를 수정합니다.</p>
            </div>
            <button class="modal-close" id="btnEditClose">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editUserId">
            <div class="form-grid">
                <div class="form-field">
                    <label>사용자명 <span class="required">*</span></label>
                    <input type="text" id="editName" maxlength="20">
                    <span class="field-error" id="editErrName"></span>
                </div>
                <div class="form-field">
                    <label>아이디</label>
                    <input type="text" id="editUsername" disabled>
                </div>
                <div class="form-field col-span-2">
                    <label>비밀번호</label>
                    <div class="password-reset-row">
                        <input type="password" id="editPasswordDisplay" disabled value="placeholder">
                        <button class="btn-outline-sm" id="btnPasswordReset" type="button">비밀번호 초기화</button>
                    </div>
                </div>
                <div class="form-field">
                    <label>소속 <span class="required">*</span></label>
                    <select id="editDepartment">
                        <option value="">조직을 선택하세요</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                    <span class="field-error" id="editErrDepartment"></span>
                </div>
                {# 소속 공장: 빈 값 선택 시 JS가 facility_id=null을 명시 전송해 기존 값을 비움.
                   PATCH partial 의미를 살리기 위한 의도된 비대칭 (등록 모달과 다름). #}
                <div class="form-field">
                    <label>소속 공장</label>
                    <select id="editFacility">
                        <option value="">공장을 선택하세요 (선택)</option>
                        {% for f in facilities %}
                        <option value="{{ f.id }}">{{ f.name }}</option>
                        {% endfor %}
                    </select>
                    <span class="field-error" id="editErrFacility"></span>
                </div>
                <div class="form-field">
                    <label>직위</label>
                    <select id="editPosition">
                        <option value="">직급을 입력하세요</option>
                        {% for pos in positions %}
                        <option value="{{ pos.id }}">{{ pos.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-field">
                    <label>계정 상태 <span class="required">*</span></label>
                    <select id="editStatus">
                        <option value="">상태를 선택하세요</option>
                        <option value="active">사용</option>
                        <option value="locked">잠금</option>
                        <option value="inactive">비활성</option>
                    </select>
                    <span class="field-error" id="editErrStatus"></span>
                </div>
                <div class="form-field">
                    <label>이메일</label>
                    <input type="text" id="editEmail" maxlength="100">
                    <span class="field-error" id="editErrEmail"></span>
                </div>
                <div class="form-field">
                    <label>연락처 <span class="required">*</span></label>
                    <input type="text" id="editPhone" maxlength="13">
                    <span class="field-error" id="editErrPhone"></span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" id="btnEditCancel">취소</button>
            <button class="btn-primary" id="btnEditSubmit">저장</button>
        </div>
    </div>
</div>
