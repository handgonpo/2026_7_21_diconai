{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이벤트 현황 — 산재 예방 통합 관제 시스템</title>
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
<link rel="stylesheet" href="{% static 'css/components/header.css' %}">
<link rel="stylesheet" href="{% static 'css/detail/event_monitoring.css' %}">
</head>
<body>

{% include 'components/header.html' %}
{% include 'components/alarm_popup.html' %}

<div class="body-wrap page-wrap">
  <div class="page-header">
    <span class="breadcrumb">모니터링 &gt; 이벤트 현황</span>
  </div>

  <div class="panel">
    <div class="event-list-header">
      <span class="panel-title" style="margin:0;">이벤트 목록</span>
      <div class="event-filter-tabs">
        <button class="filter-tab active" data-status="pending">
          조치 필요 <span class="tab-count" id="cnt-pending">-</span>
        </button>
        <button class="filter-tab" data-status="in_progress">
          조치 중 <span class="tab-count" id="cnt-in-progress">-</span>
        </button>
        <button class="filter-tab" data-status="resolved">
          조치 완료 <span class="tab-count" id="cnt-resolved">-</span>
        </button>
      </div>
    </div>

    <table class="event-table">
      <thead>
        <tr>
          <th>조치 상태</th>
          <th>No.</th>
          <th>위험 상태</th>
          <th>이벤트명</th>
          <th>발생원</th>
          <th>발생 시간</th>
          <th>상세 내용</th>
        </tr>
      </thead>
      <tbody id="event-tbody">
        <tr><td colspan="7" class="empty-row">불러오는 중...</td></tr>
      </tbody>
    </table>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="{% static 'js/shared/util.js' %}"></script>
{% include 'components/app_config.html' %}
<script src="{% static 'js/shared/config.js' %}"></script>
<script src="{% static 'js/shared/auth.js' %}"></script>
<script src="{% static 'js/shared/ws-client.js' %}"></script>
<script src="{% static 'js/shared/layout.js' %}"></script>
<script src="{% static 'js/shared/app-sub.js' %}"></script>
<script src="{% static 'js/shared/alarm-popup.js' %}"></script>
<script src="{% static 'js/shared/time-format.js' %}"></script>
<script src="{% static 'js/shared/alarm-mapper.js' %}"></script>
<script src="{% static 'js/shared/worker-ws.js' %}"></script>
<script src="{% static 'js/shared/alarm-ws.js' %}"></script>
<script src="{% static 'js/detail/event_list.js' %}"></script>
</body>
</html>
