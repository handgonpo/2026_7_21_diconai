<!-- 패널 15: AI 예측 — 전력 -->
<div class="panel panel-chart">
  <div class="panel-title">AI 예측 — 스마트 전력 시스템 위험 <a href="/dashboard/monitoring/power/" class="more">+ 상세 보기</a></div>
  <div class="ai-nav">
    <span id="aiPowerEquipName" class="fw ai-equip-name"><span class="skeleton skel-text"></span></span>
    <div class="ai-nav-ctrl">
      <button class="ai-nav-btn" id="aiPowerPrev">&#9664;</button>
      <span class="sub" id="aiPowerNavCount">- / -</span>
      <button class="ai-nav-btn" id="aiPowerNext">&#9654;</button>
    </div>
  </div>
  <div id="aiPowerPanelMsg" class="panel-msg" style="display:none;"></div>
  <div class="ai-kpi-box">
    <div class="ai-kpi-row">
      <div class="ai-kpi-item">
        <div class="sub">위험 도달 예상 시간</div>
        <div class="eta-val" id="aiPowerEta"><span class="skeleton skel-text skel-sm"></span></div>
      </div>
      <div class="ai-kpi-divider"></div>
