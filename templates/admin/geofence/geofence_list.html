{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위험구역 관리 - 산재 예방 통합 관제 시스템</title>
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin/geofence.css' %}">
</head>
<body>
<div class="app-container">

    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="brand-logo"><span class="icon">로고</span></div>
        <nav class="snb">
            <a href="#"><span class="icon">계정</span></a>
            <a href="#"><span class="icon">조직</span></a>
            <a href="#"><span class="icon">설비</span></a>
            <a href="#" class="active"><span class="icon">지도/구역</span></a>
            <a href="#"><span class="icon">데이터</span></a>
            <a href="#"><span class="icon">로그</span></a>
        </nav>
    </aside>

    <div class="main-wrapper">

        <!-- 헤더 -->
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="system-title">산재 예방 통합 관제 시스템</h1>
                <button class="btn-realtime" onclick="location.href='/dashboard/'">실시간 관제 홈</button>
            </div>
            <div class="topbar-right">
                <div class="admin-info">
                    <span id="adminName" class="admin-name"></span>
                    <span id="adminRole" class="admin-email"></span>
                </div>
                <button id="btnHome" class="icon-btn" title="홈">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                </button>
                <div class="topbar-actions">
                    <button id="btnLogout" class="btn-outline">로그아웃</button>
                </div>
            </div>
        </header>

        <main class="content">

            <!-- 페이지 헤더 -->
            <section class="page-header">
                <div class="header-titles">
                    <div class="breadcrumb">지도/구역 관리 &gt; 위험구역 관리</div>
                    <h2 class="page-title">위험구역 관리</h2>
                    <p class="page-desc">위험구역(지오펜스)을 조회하고 등록, 수정, 삭제할 수 있습니다.</p>
                </div>
                <button class="btn-primary" id="btnAdd">+ 위험구역 등록</button>
            </section>

            <!-- 검색 필터 -->
            <section class="filter-card">
                <div class="filter-inputs">
                    <div class="input-group">
                        <label>구역명</label>
                        <input type="text" id="filterName" placeholder="구역명 입력">
                    </div>
                    <div class="input-group">
                        <label>위험도</label>
                        <select id="filterRisk">
                            <option value="">전체</option>
                            <option value="danger">위험</option>
                            <option value="warning">주의</option>
                            <option value="normal">정상</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="btn-outline" id="btnReset">초기화</button>
                    <button class="btn-dark" id="btnSearch">검색</button>
                </div>
            </section>

            <!-- 테이블 -->
            <section class="table-card">
                <div class="table-toolbar">
                    <div class="toolbar-left">
                        <span class="total-count">전체 <strong id="totalCount">0</strong>개</span>
                        <button class="btn-danger" id="btnDelete" disabled>삭제</button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="checkAll"></th>
                                <th>ID</th>
                                <th>구역명</th>
                                <th>공장</th>
                                <th>위험도</th>
                                <th>현재 작업자 수</th>
                                <th>등록일</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="geofenceTableBody">
                            <tr>
                                <td colspan="8" class="empty-state">데이터를 불러오는 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="table-footer">
                    <span class="page-info" id="pageInfo">0 - 0 / 0</span>
                    <div class="pagination" id="pagination"></div>
                </div>
            </section>
        </main>
    </div>
</div>

<!-- 등록/수정 모달 -->
<div id="geofenceModal" class="modal-overlay" style="display:none;">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle">위험구역 등록</h3>
            <button class="modal-close" id="btnModalClose">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="modalId">
            <div class="input-group">
                <label>구역명 <span class="required">*</span></label>
                <input type="text" id="modalName" placeholder="구역명 입력">
            </div>
            <div class="input-group">
                <label>위험도 <span class="required">*</span></label>
                <select id="modalRisk">
                    <option value="danger">위험</option>
                    <option value="warning">주의</option>
                    <option value="normal">정상</option>
                </select>
            </div>
            <div class="input-group">
                <label>설명</label>
                <textarea id="modalDesc" placeholder="구역 설명 입력" rows="3"></textarea>
            </div>
                <div class="input-group">
        <label>polygon 좌표 <span class="required">*</span> <small style="color:#6e7681;">(최소 3개)</small></label>
        <div id="coordList"></div>
        <button class="btn-outline" id="btnAddCoord" style="margin-top:8px; width:100%;">+ 좌표 추가</button>
    </div>
</div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" id="btnModalCancel">취소</button>
            <button class="btn-primary" id="btnModalSave">저장</button>
        </div>
    </div>
</div>

<script src="{% static 'js/refactors/auth.js' %}"></script>
<script src="{% static 'js/admin/main.js' %}"></script>
<script src="{% static 'js/admin/geofence/geofence.js' %}"></script>
</body>
</html>
