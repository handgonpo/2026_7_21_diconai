<!-- CM-07 실시간 알림 팝업 — 위험/주의 전용 중앙 차단형 -->
<div id="alarm-popup" style="display:none;">

  <!-- 그룹 카운트 뱃지 (동일 센서·레벨 연속 알람 누적, 우상단 원형) -->
  <span id="alarm-popup-count" class="alarm-popup-count" style="display:none;">1</span>

  <!-- 상단: 발생 시간 + 큐 풀 누락 배지 + 닫기 버튼 -->
  <div class="alarm-popup-top">
    <div class="alarm-popup-time-badge">
      <span class="alarm-popup-time-label">발생 시간</span>
      <span id="alarm-popup-time">--</span>
    </div>
    <!-- 큐 풀로 인한 알람 drop 누락 누적 알림 (클릭 시 이벤트 이력 페이지로) -->
    <button id="alarm-popup-drop-badge" class="alarm-popup-drop-badge" style="display:none;" title="누락된 알람 확인">
      +<span id="alarm-popup-drop-count">0</span>건 누락
    </button>
    <button id="alarm-popup-close">✕</button>
  </div>

  <!-- 중앙: 아이콘 + 알림 유형 라벨 -->
  <div class="alarm-popup-icon-wrap">
    <div id="alarm-popup-icon" class="alarm-popup-icon">⚠</div>
    <span id="alarm-popup-type-label" class="alarm-popup-type-label">긴급 알림</span>
  </div>

  <!-- 주요 행동 메시지 -->
  <p id="alarm-popup-action" class="alarm-popup-action">즉시 대피하세요!</p>

  <!-- 위험도 배지 + 상세 메시지 -->
  <div class="alarm-popup-desc-row">
    <span id="alarm-popup-level" class="brisk danger">위험</span>
    <span id="alarm-popup-message" class="alarm-popup-desc"></span>
  </div>

  <!-- 하단 버튼 2개 -->
  <div class="alarm-popup-btn-row">
    <button id="alarm-popup-detail" class="alarm-popup-btn-detail">상세 보기</button>
    <button id="alarm-popup-confirm" class="alarm-popup-btn-confirm">확인 완료</button>
  </div>

</div>

<!-- CM-07 정상화 알림 토스트 — 우하단 비차단형 -->
<div id="alarm-toast" style="display:none;">
  <div class="alarm-toast-icon">✓</div>
  <div class="alarm-toast-body">
    <div class="alarm-toast-title">정상화 알림</div>
    <div id="alarm-toast-message" class="alarm-toast-msg"></div>
  </div>
  <button id="alarm-toast-close">✕</button>
</div>
