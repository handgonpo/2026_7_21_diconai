{% load static %}
<!-- ───────────────── SNB 오버레이 ───────────────── -->
<div id="snbOverlay" class="snb-overlay"></div>

<!-- ───────────────── SNB Drawer ─────────────────── -->
<nav id="snbDrawer" class="snb-drawer" aria-label="사이드 메뉴">
  <div id="snbMenu" class="snb-menu">
    <!-- JS로 렌더링 -->
  </div>
  <div id="snbError" class="snb-error" style="display:none;">메뉴를 불러올 수 없습니다.</div>
</nav>

<!-- ───────────────── 헤더 (CM-01 / CM-02) ────────── -->
<header class="header">
  <!-- 좌측: 햄버거 + 로고 + 시스템명 -->
  <div class="header-left">
    <button id="hamburger" class="hamburger" aria-label="메뉴 열기">☰</button>
    <a href="/" class="logo-link">
      <img src="{% static 'img/logo.png' %}" alt="로고" class="logo-img">
    </a>
    <div class="system-name">산재 예방 통합 관제 시스템</div>

    <!-- ④ 관리자 메뉴 버튼 — admin / superadmin 권한 시에만 노출 -->
    <button id="btnAdmin" class="admin-menu-btn" title="관리자 백오피스" aria-label="관리자 메뉴" style="display:none;">
      관리자 메뉴
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
      </svg>
    </button>
  </div>

  <!-- 가운데: 사용자 정보 + 관리자 메뉴 버튼 (CM-01 / CM-02) -->
  <div class="header-center">
    <div class="user-info">
      <div class="user-name" id="headerUsername">-</div>
    </div>
  </div>

  <!-- 우측: 시간 + 아이콘 + 로그아웃 (CM-02) -->
  <div class="header-right">
    <div class="time-box">
      <div>현재 시스템 시간 : <span id="clock"></span></div>
      <div class="sub">최종 갱신 : <span id="lastUpdate">-</span></div>
    </div>
    <div class="header-icons">
      <button id="btnRefresh" class="icon-btn" title="새로고침" aria-label="데이터 새로고침">⟳</button>
      <button id="btnHome" class="icon-btn" title="홈" aria-label="홈으로 이동">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </button>
      <!-- D 옵션 (2026-05-17) — 헤더 미확인 알람 배지. AlarmBadge (alarm-badge.js) 가
           초기값을 /alerts/api/alarms/summary/ 의 user_unread_event_count 로 fetch,
           newAlarmEvent CustomEvent 수신마다 카운터 ↑, 클릭 시 이력 페이지 + reset.
           종 아이콘은 항상 표시 (관리 시스템 컨벤션) — 카운트 동그라미만 count ≥ 1 일 때 노출. -->
      <button id="btnAlarmBadge" class="icon-btn alarm-badge-btn" title="미확인 알람 — 이력 페이지로" aria-label="미확인 알람 보기">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11a6 6 0 1 0-12 0v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <span class="alarm-badge-count" hidden>0</span>
      </button>
    </div>
    <button id="btnLogout" class="logout-btn">로그아웃</button>
  </div>
</header>

<!-- ───────────────── 로그아웃 확인 팝업 ────────── -->
<div id="logoutModal" class="modal-backdrop" style="display:none;">
  <div class="modal-box">
    <div class="modal-icon modal-icon--warn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="4" x2="12" y2="15"/>
        <circle cx="12" cy="19.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <p class="modal-msg-lg">로그아웃 하시겠습니까?</p>
    <div class="modal-btns">
      <button id="logoutConfirm" class="modal-btn-ok">로그아웃</button>
      <button id="logoutCancel"  class="modal-btn-cancel">취소</button>
    </div>
  </div>
</div>

<!-- ───────────────── 로그아웃 완료 팝업 ────────── -->
<div id="logoutSuccessModal" class="modal-backdrop" style="display:none;">
  <div class="modal-box">
    <div class="modal-icon modal-icon--success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 13 9 18 20 7"/>
      </svg>
    </div>
    <p class="modal-msg-lg">로그아웃 되었습니다.</p>
    <button id="logoutSuccessOk" class="modal-btn-blue">확 인</button>
  </div>
</div>
